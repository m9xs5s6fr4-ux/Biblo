<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Biblo – Dein Bibelbegleiter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f7f3e9;
      text-align: center;
      padding: 50px;
    }
    h1 {
      color: #2c3e50;
    }
    textarea {
      width: 80%;
      height: 100px;
      margin-top: 20px;
      padding: 10px;
      font-size: 16px;
    }
    button {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 16px;
      background-color: #3498db;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
    button:hover {
      background-color: #2980b9;
    }
    #response {
      margin-top: 30px;
      background-color: #ecf0f1;
      padding: 20px;
      border-radius: 10px;
      text-align: left;
      width: 80%;
      margin-left: auto;
      margin-right: auto;
      min-height: 50px;
    }
  </style>
</head>
<body>
  <h1>Biblo – Dein Bibelbegleiter</h1>
  <textarea id="question" placeholder="Stelle deine Frage an Biblo..."></textarea><br>
  <button onclick="askAI()">Frage stellen</button>
  <div id="response">Antwort erscheint hier...</div>

  <script>
    async function askAI() {
      const question = document.getElementById("question").value;
      const responseElement = document.getElementById("response");
      responseElement.innerText = "Biblo denkt... ⏳";

      const response = await fetch("https://api.openai.com/v1/responses", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer DEIN_API_KEY"
        },
        body: JSON.stringify({
          model: "gpt-4.1-mini",
          input: "Du bist Biblo, ein freundlicher und bibeltreuer Bibelbegleiter. Hilf den Menschen, eine tiefere Beziehung zu Jesus zu entwickeln. Frage: " + question
        })
      });

      const data = await response.json();
      const answer = data.output?.[0]?.content?.[0]?.text || "Biblo konnte leider keine Antwort geben.";
      responseElement.innerText = answer;
    }
  </script>
</body>
</html>
